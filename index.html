<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Spots - 가족 나들이 추천</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#22263a;--card-hover:#2a2f45;
  --primary:#6c63ff;--primary-light:#8b83ff;--accent:#ff6b9d;
  --text:#e8e8f0;--text-dim:#8b8da0;--text-muted:#5a5c6e;
  --border:#2e3148;--success:#4ade80;--warning:#fbbf24;--danger:#f87171;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:var(--primary-light);text-decoration:none}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:1.2rem;font-weight:700}
.header h1 span{color:var(--primary-light)}
.season-badge{background:var(--card);padding:4px 12px;border-radius:20px;font-size:0.8rem;color:var(--text-dim)}

/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:49px;z-index:99}
.tab{flex:1;padding:12px 8px;text-align:center;cursor:pointer;font-size:0.85rem;color:var(--text-dim);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;min-width:80px}
.tab.active{color:var(--primary-light);border-bottom-color:var(--primary);background:rgba(108,99,255,.05)}
.tab:hover{color:var(--text);background:rgba(255,255,255,.02)}

/* Main */
.main{max-width:900px;margin:0 auto;padding:16px}
.page{display:none}.page.active{display:block}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:all .2s}
.card:hover{background:var(--card-hover);border-color:var(--primary);transform:translateY(-1px)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-title{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:8px}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0}
.badge{padding:2px 8px;border-radius:12px;font-size:0.7rem;background:rgba(108,99,255,.15);color:var(--primary-light)}
.badge.season{background:rgba(251,191,36,.15);color:var(--warning)}
.badge.age{background:rgba(74,222,128,.15);color:var(--success)}
.badge.visited{background:rgba(74,222,128,.2);color:var(--success)}
.badge.not-visited{background:rgba(248,113,113,.1);color:var(--danger)}
.card-meta{font-size:0.8rem;color:var(--text-dim);margin-top:6px}
.card-actions{display:flex;gap:6px;margin-top:10px}
.stars{color:var(--warning);font-size:0.9rem;letter-spacing:1px}

/* Buttons */
.btn{padding:8px 16px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:0.8rem;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-light)}
.btn-sm{padding:5px 10px;font-size:0.75rem}
.btn-danger{background:rgba(248,113,113,.15);color:var(--danger)}.btn-danger:hover{background:rgba(248,113,113,.25)}
.btn-success{background:rgba(74,222,128,.15);color:var(--success)}.btn-success:hover{background:rgba(74,222,128,.25)}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--primary);color:var(--text)}
.btn-accent{background:rgba(255,107,157,.15);color:var(--accent)}.btn-accent:hover{background:rgba(255,107,157,.25)}

/* Forms */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:0.8rem;color:var(--text-dim);margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:60px}
select{cursor:pointer}

/* Filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filters select{width:auto;min-width:100px;padding:7px 10px;font-size:0.8rem}
.filter-label{font-size:0.75rem;color:var(--text-muted);margin-right:-4px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:24px}
.modal h2{font-size:1.1rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* Rating */
.rating-input{display:flex;gap:4px;font-size:1.4rem;cursor:pointer}
.rating-input span{color:var(--text-muted);transition:color .15s}
.rating-input span.active{color:var(--warning)}

/* Tags */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:0.8rem}
.tag .remove{cursor:pointer;color:var(--danger);font-size:0.7rem}

/* Calendar */
.calendar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--surface)}
.cal-header h3{font-size:0.95rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:4px}
.cal-day-name{text-align:center;font-size:0.7rem;color:var(--text-muted);padding:6px 0}
.cal-day{text-align:center;padding:8px 4px;font-size:0.8rem;color:var(--text-dim);border-radius:var(--radius-sm);cursor:pointer;min-height:40px;position:relative}
.cal-day:hover{background:rgba(255,255,255,.05)}
.cal-day.today{background:rgba(108,99,255,.15);color:var(--primary-light);font-weight:700}
.cal-day.has-plan{position:relative}
.cal-day.has-plan::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent)}
.cal-day.other-month{color:var(--text-muted);opacity:.3}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-value{font-size:1.6rem;font-weight:700;color:var(--primary-light)}
.stat-label{font-size:0.75rem;color:var(--text-dim);margin-top:2px}

/* Section */
.section-title{font-size:0.95rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Plan item */
.plan-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.plan-item .check{width:20px;height:20px;border:2px solid var(--border);border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.7rem}
.plan-item .check.done{background:var(--success);border-color:var(--success);color:#000}
.plan-item .plan-info{flex:1;font-size:0.85rem}
.plan-item .plan-date{font-size:0.7rem;color:var(--text-muted)}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-icon{font-size:2.5rem;margin-bottom:8px}

/* Responsive */
@media(max-width:600px){
  .main{padding:10px}
  .filters{gap:6px}
  .filters select{min-width:80px;font-size:0.75rem}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .modal{padding:18px}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--primary);color:var(--text);padding:10px 20px;border-radius:var(--radius);font-size:0.85rem;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Recommend section */
.rec-section{margin-bottom:20px}
.rec-section h3{font-size:0.9rem;color:var(--text-dim);margin-bottom:10px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>

<div class="header">
  <h1>🏠 <span>Family Spots</span></h1>
  <div class="season-badge" id="seasonBadge"></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="recommend">✨ 추천</div>
  <div class="tab" data-tab="spots">📍 장소</div>
  <div class="tab" data-tab="planner">📅 플래너</div>
  <div class="tab" data-tab="settings">⚙️ 설정</div>
</div>

<div class="main">
  <!-- 추천 페이지 -->
  <div class="page active" id="page-recommend">
    <div class="filters">
      <span class="filter-label">카테고리</span>
      <select id="recFilterCat"><option value="">전체</option></select>
      <span class="filter-label">연령</span>
      <select id="recFilterAge"><option value="">전체</option></select>
      <span class="filter-label">지역</span>
      <select id="recFilterRegion"><option value="">전체</option></select>
      <label style="font-size:0.8rem;display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--text-dim)">
        <input type="checkbox" id="recUnvisited" style="width:auto"> 안 가본 곳만
      </label>
    </div>
    <div id="recList"></div>
  </div>

  <!-- 장소 목록 -->
  <div class="page" id="page-spots">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="section-title" style="margin-bottom:0">전체 장소</div>
      <button class="btn btn-primary btn-sm" onclick="openSpotModal()">+ 장소 등록</button>
    </div>
    <div class="filters">
      <input type="text" id="spotSearch" placeholder="검색..." style="width:160px;padding:7px 10px;font-size:0.8rem">
      <select id="spotFilterCat"><option value="">전체 카테고리</option></select>
      <select id="spotFilterRegion"><option value="">전체 지역</option></select>
      <select id="spotSort">
        <option value="name">이름순</option>
        <option value="rating">평점순</option>
        <option value="recent">최근 등록</option>
      </select>
    </div>
    <div id="spotList"></div>
  </div>

  <!-- 플래너 -->
  <div class="page" id="page-planner">
    <div class="stats-grid" id="monthStats"></div>
    <div class="calendar" id="calendar"></div>
    <div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center">
      <div class="section-title" style="margin-bottom:0">📌 이번 주 계획</div>
      <button class="btn btn-primary btn-sm" onclick="openPlanModal()">+ 계획 추가</button>
    </div>
    <div id="weekPlans" style="margin-top:10px"></div>
    <div style="margin-top:20px">
      <div class="section-title">📊 월별 카테고리 분포</div>
      <div id="catDistribution"></div>
    </div>
  </div>

  <!-- 설정 -->
  <div class="page" id="page-settings">
    <div class="card">
      <div class="section-title">🏡 내 지역 설정</div>
      <div class="form-group">
        <label>거주 지역</label>
        <select id="homeRegion"></select>
      </div>
    </div>
    <div class="card">
      <div class="section-title">⭐ 자주 가는 지역</div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <select id="addFavRegion" style="flex:1"></select>
        <button class="btn btn-primary btn-sm" onclick="addFavRegion()">추가</button>
      </div>
      <div class="tag-list" id="favRegionList"></div>
    </div>
    <div class="card">
      <div class="section-title">💾 데이터 관리</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="exportData()">📤 JSON 내보내기</button>
        <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">📥 JSON 가져오기</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn btn-danger" onclick="resetData()">🗑️ 초기화</button>
      </div>
    </div>
  </div>
</div>

<!-- 장소 등록/수정 모달 -->
<div class="modal-overlay" id="spotModal">
  <div class="modal">
    <h2 id="spotModalTitle">📍 장소 등록</h2>
    <input type="hidden" id="spotEditId">
    <div class="form-group"><label>장소 이름 *</label><input id="spotName" placeholder="예: 키자니아 서울"></div>
    <div class="form-group"><label>지역 *</label><select id="spotRegion"></select></div>
    <div class="form-group"><label>카테고리 *</label><select id="spotCategory"></select></div>
    <div class="form-group">
      <label>연령대 (복수 선택)</label>
      <div id="spotAges" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px"></div>
    </div>
    <div class="form-group">
      <label>시즌 (복수 선택)</label>
      <div id="spotSeasons" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px"></div>
    </div>
    <div class="form-group">
      <label>평점</label>
      <div class="rating-input" id="spotRating"></div>
    </div>
    <div class="form-group"><label>메모</label><textarea id="spotMemo" placeholder="간단한 메모..."></textarea></div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="spotVisited" style="width:auto"> 방문 완료
      </label>
    </div>
    <div class="form-group" id="reviewGroup" style="display:none">
      <label>방문 후기</label>
      <textarea id="spotReview" placeholder="방문 후기를 작성하세요..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSpotModal()">취소</button>
      <button class="btn btn-primary" onclick="saveSpot()">저장</button>
    </div>
  </div>
</div>

<!-- 계획 모달 -->
<div class="modal-overlay" id="planModal">
  <div class="modal">
    <h2>📅 계획 추가</h2>
    <div class="form-group"><label>날짜 *</label><input type="date" id="planDate"></div>
    <div class="form-group"><label>장소 *</label><select id="planSpot"></select></div>
    <div class="form-group"><label>메모</label><input id="planMemo" placeholder="메모..."></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closePlanModal()">취소</button>
      <button class="btn btn-primary" onclick="savePlan()">저장</button>
    </div>
  </div>
</div>

<!-- 장소 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>

<div class="toast" id="toast"></div>

let state = loadState();

function getDefaultState(){
  return {
    homeRegion:'서울 송파구',
    favRegions:['서울 강남구','서울 송파구','경기 과천','경기 용인','경기 가평'],
    spots: DEFAULT_SPOTS.map((s,i)=>({...s,id:'default_'+i,createdAt:Date.now()-i*60000})),
    plans:[]
  };
}

function loadState(){
  try{
    const d=localStorage.getItem('familySpots');
    if(d) return JSON.parse(d);
  }catch(e){}
  return getDefaultState();
}

function save(){localStorage.setItem('familySpots',JSON.stringify(state))}

// === Utility ===
function getCurrentSeason(){
  const m=new Date().getMonth()+1;
  if(m>=3&&m<=5) return 'spring';
  if(m>=6&&m<=8) return 'summer';
  if(m>=9&&m<=11) return 'autumn';
  return 'winter';
}

function getSeasonName(id){return SEASONS.find(s=>s.id===id)?.name||id}
function getSeasonIcon(id){return SEASONS.find(s=>s.id===id)?.icon||''}
function getCatName(id){return CATEGORIES.find(c=>c.id===id)?.name||id}
function getCatIcon(id){return CATEGORIES.find(c=>c.id===id)?.icon||'📍'}
function getAgeName(id){return AGES.find(a=>a.id===id)?.name||id}

function starsHtml(r){return '★'.repeat(r)+'☆'.repeat(5-r)}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function getMonthSeason(m){
  if(m>=3&&m<=5) return 'spring';
  if(m>=6&&m<=8) return 'summer';
  if(m>=9&&m<=11) return 'autumn';
  return 'winter';
}

// === Populate Selects ===
function populateSelect(el,options,selected){
  if(typeof el==='string') el=document.getElementById(el);
  const firstOpt=el.querySelector('option');
  el.innerHTML='';
  if(firstOpt&&firstOpt.value==='') el.appendChild(firstOpt);
  options.forEach(o=>{
    const opt=document.createElement('option');
    opt.value=typeof o==='string'?o:o.id;
    opt.textContent=typeof o==='string'?o:(o.icon?o.icon+' ':'')+o.name;
    if(selected&&opt.value===selected) opt.selected=true;
    el.appendChild(opt);
  });
}

function populateAllSelects(){
  populateSelect('recFilterCat',[{id:'',name:'전체'},...CATEGORIES]);
  populateSelect('recFilterAge',[{id:'',name:'전체'},...AGES]);
  populateSelect('spotFilterCat',[{id:'',name:'전체 카테고리'},...CATEGORIES]);
  const myRegions=[{id:'',name:'전체 지역'},...getAllRegions().map(r=>({id:r,name:r}))];
  populateSelect('recFilterRegion',myRegions);
  populateSelect('spotFilterRegion',myRegions);
  populateSelect('spotRegion',REGIONS);
  populateSelect('spotCategory',CATEGORIES);
  populateSelect('homeRegion',REGIONS,state.homeRegion);
  populateSelect('addFavRegion',REGIONS);
}

function getAllRegions(){
  const set=new Set([state.homeRegion,...state.favRegions]);
  return [...set].sort();
}

// === Recommend Page ===
function renderRecommend(){
  const season=getCurrentSeason();
  const cat=document.getElementById('recFilterCat').value;
  const age=document.getElementById('recFilterAge').value;
  const region=document.getElementById('recFilterRegion').value;
  const unvisitedOnly=document.getElementById('recUnvisited').checked;
  const myRegions=getAllRegions();

  let spots=state.spots.filter(s=>{
    if(region){if(s.region!==region) return false}
    else{if(!myRegions.includes(s.region)) return false}
    if(cat&&s.category!==cat) return false;
    if(age&&!s.ages.includes(age)) return false;
    if(unvisitedOnly&&s.visited) return false;
    const seasonMatch=s.seasons.includes(season)||s.seasons.includes('always');
    return seasonMatch;
  });

  spots.sort((a,b)=>{
    if(a.visited!==b.visited) return a.visited?1:-1;
    return b.rating-a.rating;
  });

  const container=document.getElementById('recList');
  if(!spots.length){
    container.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>조건에 맞는 장소가 없습니다.<br>설정에서 지역을 추가하거나 장소를 등록해보세요.</div>';
    return;
  }

  container.innerHTML=`<div class="rec-section"><h3>${getSeasonIcon(season)} ${getSeasonName(season)} 추천 장소 (${spots.length}곳)</h3></div>`+
    spots.map(s=>spotCard(s,true)).join('');
}

function spotCard(s, showAddPlan){
  const catI=getCatIcon(s.category);
  const vis=s.visited?'<span class="badge visited">✓ 방문</span>':'<span class="badge not-visited">미방문</span>';
  return `<div class="card" onclick="showDetail('${s.id}')">
    <div class="card-header">
      <div class="card-title">${catI} ${s.name}</div>
      <div class="stars">${starsHtml(s.rating)}</div>
    </div>
    <div class="card-badges">
      <span class="badge">${getCatName(s.category)}</span>
      <span class="badge">${s.region}</span>
      ${s.seasons.map(ss=>'<span class="badge season">'+getSeasonIcon(ss)+getSeasonName(ss)+'</span>').join('')}
      ${s.ages.map(a=>'<span class="badge age">'+getAgeName(a)+'</span>').join('')}
      ${vis}
    </div>
    ${s.memo?'<div class="card-meta">'+s.memo+'</div>':''}
    <div class="card-actions" onclick="event.stopPropagation()">
      <button class="btn btn-sm btn-ghost" onclick="openSpotModal('${s.id}')">✏️ 수정</button>
      <button class="btn btn-sm ${s.visited?'btn-accent':'btn-success'}" onclick="toggleVisit('${s.id}')">${s.visited?'미방문으로':'✓ 방문체크'}</button>
      ${showAddPlan?`<button class="btn btn-sm btn-ghost" onclick="quickPlan('${s.id}')">📅 계획</button>`:''}
      <button class="btn btn-sm btn-danger" onclick="deleteSpot('${s.id}')">삭제</button>
    </div>
  </div>`;
}

// === Spots Page ===
function renderSpots(){
  const search=document.getElementById('spotSearch').value.toLowerCase();
  const cat=document.getElementById('spotFilterCat').value;
  const region=document.getElementById('spotFilterRegion').value;
  const sort=document.getElementById('spotSort').value;

  let spots=state.spots.filter(s=>{
    if(search&&!s.name.toLowerCase().includes(search)&&!s.memo.toLowerCase().includes(search)) return false;
    if(cat&&s.category!==cat) return false;
    if(region&&s.region!==region) return false;
    return true;
  });

  if(sort==='name') spots.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  else if(sort==='rating') spots.sort((a,b)=>b.rating-a.rating);
  else spots.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

  document.getElementById('spotList').innerHTML=spots.length?
    spots.map(s=>spotCard(s,false)).join(''):
    '<div class="empty"><div class="empty-icon">📍</div>등록된 장소가 없습니다.</div>';
}

// === Spot Modal ===
let editingRating=0;
function openSpotModal(id){
  const modal=document.getElementById('spotModal');
  const spot=id?state.spots.find(s=>s.id===id):null;
  document.getElementById('spotModalTitle').textContent=spot?'📍 장소 수정':'📍 장소 등록';
  document.getElementById('spotEditId').value=id||'';
  document.getElementById('spotName').value=spot?spot.name:'';
  populateSelect('spotRegion',REGIONS,spot?spot.region:state.homeRegion);
  populateSelect('spotCategory',CATEGORIES,spot?spot.category:'');
  document.getElementById('spotMemo').value=spot?spot.memo:'';
  document.getElementById('spotVisited').checked=spot?spot.visited:false;
  document.getElementById('spotReview').value=spot?spot.review:'';
  toggleReviewGroup();

  // Ages checkboxes
  const agesDiv=document.getElementById('spotAges');
  agesDiv.innerHTML=AGES.map(a=>`<label style="display:flex;align-items:center;gap:3px;font-size:0.8rem;cursor:pointer;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm)"><input type="checkbox" value="${a.id}" ${spot&&spot.ages.includes(a.id)?'checked':''} style="width:auto">${a.name}</label>`).join('');

  // Seasons checkboxes
  const seasonsDiv=document.getElementById('spotSeasons');
  seasonsDiv.innerHTML=SEASONS.map(s=>`<label style="display:flex;align-items:center;gap:3px;font-size:0.8rem;cursor:pointer;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm)"><input type="checkbox" value="${s.id}" ${spot&&spot.seasons.includes(s.id)?'checked':''} style="width:auto">${s.icon} ${s.name}</label>`).join('');

  // Rating
  editingRating=spot?spot.rating:3;
  renderRatingInput();

  modal.classList.add('active');
}

function renderRatingInput(){
  const div=document.getElementById('spotRating');
  div.innerHTML='';
  for(let i=1;i<=5;i++){
    const span=document.createElement('span');
    span.textContent=i<=editingRating?'★':'☆';
    if(i<=editingRating) span.classList.add('active');
    span.onclick=()=>{editingRating=i;renderRatingInput()};
    div.appendChild(span);
  }
}

function closeSpotModal(){document.getElementById('spotModal').classList.remove('active')}

function toggleReviewGroup(){
  document.getElementById('reviewGroup').style.display=document.getElementById('spotVisited').checked?'block':'none';
}
document.getElementById('spotVisited').addEventListener('change',toggleReviewGroup);

function saveSpot(){
  const name=document.getElementById('spotName').value.trim();
  if(!name){toast('장소 이름을 입력해주세요');return}
  const region=document.getElementById('spotRegion').value;
  const category=document.getElementById('spotCategory').value;
  const ages=[...document.querySelectorAll('#spotAges input:checked')].map(c=>c.value);
  const seasons=[...document.querySelectorAll('#spotSeasons input:checked')].map(c=>c.value);
  if(!seasons.length){toast('시즌을 선택해주세요');return}
  const memo=document.getElementById('spotMemo').value.trim();
  const visited=document.getElementById('spotVisited').checked;
  const review=document.getElementById('spotReview').value.trim();
  const editId=document.getElementById('spotEditId').value;

  if(editId){
    const spot=state.spots.find(s=>s.id===editId);
    if(spot){Object.assign(spot,{name,region,category,ages,seasons,rating:editingRating,memo,visited,review})}
  }else{
    state.spots.push({id:'spot_'+Date.now(),name,region,category,ages,seasons,rating:editingRating,memo,visited,review,createdAt:Date.now()});
  }
  save();closeSpotModal();
  renderSpots();renderRecommend();
  toast(editId?'장소가 수정되었습니다':'장소가 등록되었습니다');
}

function deleteSpot(id){
  if(!confirm('이 장소를 삭제하시겠습니까?')) return;
  state.spots=state.spots.filter(s=>s.id!==id);
  state.plans=state.plans.filter(p=>p.spotId!==id);
  save();renderSpots();renderRecommend();renderPlanner();
  toast('삭제되었습니다');
}

function toggleVisit(id){
  const s=state.spots.find(sp=>sp.id===id);
  if(s){s.visited=!s.visited;if(!s.visited)s.review=''}
  save();renderSpots();renderRecommend();
  toast(s.visited?'방문 완료!':'미방문으로 변경');
}

function renderCalendar(){
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  const startDay=first.getDay();
  const days=last.getDate();
  const today=new Date();
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  let html=`<div class="cal-header">
    <button class="btn btn-sm btn-ghost" onclick="calYear=${calMonth===0?calYear-1:calYear};calMonth=${calMonth===0?11:calMonth-1};renderCalendar()">◀</button>
    <h3>${calYear}년 ${monthNames[calMonth]}</h3>
    <button class="btn btn-sm btn-ghost" onclick="calYear=${calMonth===11?calYear+1:calYear};calMonth=${calMonth===11?0:calMonth+1};renderCalendar()">▶</button>
  </div><div class="cal-grid">`;

  ['일','월','화','수','목','금','토'].forEach(d=>{html+=`<div class="cal-day-name">${d}</div>`});

  // Previous month days
  const prevLast=new Date(calYear,calMonth,0).getDate();
  for(let i=startDay-1;i>=0;i--){html+=`<div class="cal-day other-month">${prevLast-i}</div>`}

  for(let d=1;d<=days;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasPlan=state.plans.some(p=>p.date===dateStr);
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    html+=`<div class="cal-day${isToday?' today':''}${hasPlan?' has-plan':''}" onclick="showDayPlans('${dateStr}')">${d}</div>`;
  }

  // Next month days
  const remaining=7-((startDay+days)%7);
  if(remaining<7){for(let i=1;i<=remaining;i++){html+=`<div class="cal-day other-month">${i}</div>`}}

  html+='</div>';
  document.getElementById('calendar').innerHTML=html;
}

function showDayPlans(date){
  const plans=state.plans.filter(p=>p.date===date);
  if(!plans.length){
    document.getElementById('planDate').value=date;
    openPlanModal();
    return;
  }
  const spot=id=>state.spots.find(s=>s.id===id);
  alert(date+' 계획:\n'+plans.map(p=>{const s=spot(p.spotId);return(p.done?'✅':'⬜')+(s?s.name:'삭제된 장소')+(p.memo?' - '+p.memo:'')}).join('\n'));
}

function renderWeekPlans(){
  const now=new Date();
  const day=now.getDay();
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-day);
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);

  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const startStr=fmt(weekStart),endStr=fmt(weekEnd);

  const plans=state.plans.filter(p=>p.date>=startStr&&p.date<=endStr).sort((a,b)=>a.date.localeCompare(b.date));
  const container=document.getElementById('weekPlans');

  if(!plans.length){
    container.innerHTML='<div class="empty" style="padding:20px"><div class="empty-icon">📅</div>이번 주 계획이 없습니다.</div>';
    return;
  }

  container.innerHTML=plans.map(p=>{
    const s=state.spots.find(sp=>sp.id===p.spotId);
    const dayName=['일','월','화','수','목','금','토'][new Date(p.date+'T00:00:00').getDay()];
    return `<div class="plan-item">
      <div class="check ${p.done?'done':''}" onclick="togglePlan('${p.id}')">${p.done?'✓':''}</div>
      <div class="plan-info">${s?getCatIcon(s.category)+' '+s.name:'삭제된 장소'}${p.memo?' · '+p.memo:''}</div>
      <div class="plan-date">${p.date.slice(5)} (${dayName})</div>
      <button class="btn btn-sm btn-danger" onclick="deletePlan('${p.id}')">✕</button>
    </div>`;
  }).join('');
}

function renderCatDist(){
  const now=new Date();
  const monthPlans=state.plans.filter(p=>{const d=new Date(p.date);return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()&&p.done});
  const dist={};
  monthPlans.forEach(p=>{
    const s=state.spots.find(sp=>sp.id===p.spotId);
    if(s){dist[s.category]=(dist[s.category]||0)+1}
  });

  const container=document.getElementById('catDistribution');
  if(!Object.keys(dist).length){
    container.innerHTML='<div style="color:var(--text-muted);font-size:0.85rem;padding:8px 0">이번 달 완료된 방문이 없습니다.</div>';
    return;
  }
  const max=Math.max(...Object.values(dist));
  container.innerHTML=Object.entries(dist).map(([cat,cnt])=>{
    const pct=Math.round(cnt/max*100);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="width:90px;font-size:0.8rem;text-align:right">${getCatIcon(cat)} ${getCatName(cat)}</span>
      <div style="flex:1;height:20px;background:var(--bg);border-radius:4px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:var(--primary);border-radius:4px;transition:width .3s"></div>
      </div>
      <span style="font-size:0.8rem;color:var(--text-dim);width:20px">${cnt}</span>
    </div>`;
  }).join('');
}

// === Plan Modal ===
function openPlanModal(){
  const modal=document.getElementById('planModal');
  if(!document.getElementById('planDate').value){
    const now=new Date();
    document.getElementById('planDate').value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  }
  populateSelect('planSpot',state.spots.map(s=>({id:s.id,name:getCatIcon(s.category)+' '+s.name})));
  document.getElementById('planMemo').value='';
  modal.classList.add('active');
}
function closePlanModal(){document.getElementById('planModal').classList.remove('active');document.getElementById('planDate').value=''}

function quickPlan(spotId){
  const now=new Date();
  // Set to next Saturday
  const sat=new Date(now);sat.setDate(now.getDate()+(6-now.getDay()));
  document.getElementById('planDate').value=`${sat.getFullYear()}-${String(sat.getMonth()+1).padStart(2,'0')}-${String(sat.getDate()).padStart(2,'0')}`;
  openPlanModal();
  document.getElementById('planSpot').value=spotId;
}

function savePlan(){
  const date=document.getElementById('planDate').value;
  const spotId=document.getElementById('planSpot').value;
  if(!date||!spotId){toast('날짜와 장소를 선택해주세요');return}
  state.plans.push({id:'plan_'+Date.now(),date,spotId,memo:document.getElementById('planMemo').value.trim(),done:false});
  save();closePlanModal();renderPlanner();
  toast('계획이 추가되었습니다');
}

function togglePlan(id){
  const p=state.plans.find(pl=>pl.id===id);
  if(p) p.done=!p.done;
  save();renderPlanner();
}

function deletePlan(id){
  state.plans=state.plans.filter(p=>p.id!==id);
  save();renderPlanner();
  toast('계획이 삭제되었습니다');
}

// === Settings ===
function renderSettings(){
  populateSelect('homeRegion',REGIONS,state.homeRegion);
  renderFavRegions();
}

function renderFavRegions(){
  document.getElementById('favRegionList').innerHTML=state.favRegions.map(r=>
    `<div class="tag">${r} <span class="remove" onclick="removeFavRegion('${r}')">✕</span></div>`
  ).join('');
}

function addFavRegion(){
  const r=document.getElementById('addFavRegion').value;
  if(!state.favRegions.includes(r)){state.favRegions.push(r);save();renderFavRegions();populateAllSelects();toast('지역이 추가되었습니다')}
  else{toast('이미 추가된 지역입니다')}
}

function removeFavRegion(r){
  state.favRegions=state.favRegions.filter(rr=>rr!==r);save();renderFavRegions();populateAllSelects();toast('지역이 삭제되었습니다');
}

document.getElementById('homeRegion').addEventListener('change',function(){
  state.homeRegion=this.value;save();populateAllSelects();
});

// === Import/Export ===
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='family-spots-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();toast('데이터가 내보내졌습니다');
}

function importData(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(data.spots){state=data;save();populateAllSelects();renderRecommend();toast('데이터를 가져왔습니다')}
      else{toast('올바른 데이터 형식이 아닙니다')}
    }catch(err){toast('파일 읽기 오류')}
  };
  reader.readAsText(file);
  e.target.value='';
}

function resetData(){
  if(!confirm('모든 데이터가 초기화됩니다. 계속하시겠습니까?')) return;
  state=getDefaultState();save();populateAllSelects();renderRecommend();renderSettings();
  toast('초기화 완료');
}

// === Filter listeners ===
['recFilterCat','recFilterAge','recFilterRegion','recUnvisited'].forEach(id=>{
  document.getElementById(id).addEventListener('change',renderRecommend);
});
['spotSearch','spotFilterCat','spotFilterRegion','spotSort'].forEach(id=>{
  document.getElementById(id).addEventListener(id==='spotSearch'?'input':'change',renderSpots);
});

// === Close modals on overlay click ===
document.querySelectorAll('.modal-overlay').forEach(ov=>{
  ov.addEventListener('click',e=>{if(e.target===ov) ov.classList.remove('active')});
});

// === Init ===
updateSeasonBadge();
initCal();
populateAllSelects();
renderRecommend();
</script>
</body>
</html>
